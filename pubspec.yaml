  flutter_dotenv: ^5.0.2
  http: ^1.2.1
  google_mobile_ads: ^6.0.0
  get: ^4.6.6
  lottie: ^3.1.2
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  iconsax: ^0.0.8
  device_info_plus: ^11.2.0
  firebase_core_platform_interface: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  pedantic: ^1.11.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/appicon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/loader/
    - assets/splash_image1.png
    - assets/logo.png
    - assets/splash_image2.png
    - assets/splash_image3.png
    - .env
    - assets/responses.json
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/AnotherFont-Regular.ttf

dependency_overrides:
  js: ^0.7.1
