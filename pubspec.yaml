    sdk: flutter
  uuid: ^4.4.0
  path_provider: ^2.1.3
  # contacts_service: ^0.6.3
  flutter_file_dialog: ^2.0.2
  permission_handler: ^12.0.1
  file_picker: ^10.3.10
  open_file: ^3.5.11
  flutter_pdfview: ^1.0.4
  image_picker: ^0.8.4+4
