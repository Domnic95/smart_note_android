  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.4.0
  sqflite: ^2.0.0+3
  path: ^1.8.1
  pdf: ^3.11.0
  share_plus: ^10.0.2
  shared_preferences: ^2.2.3
  qr_code_scanner: ^1.0.1
  flutter_sound: ^9.4.0
  flutter_sound_web: ^9.4.0
  js: ^0.7.1
  flutter_drawing_board: ^0.7.0+2
  cupertino_icons: ^1.0.6
  pdfx: ^2.6.0
  open_settings: ^2.0.2
  flutter_document_scanner: ^1.1.1
