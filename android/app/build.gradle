plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode", "1")
def flutterVersionName = localProperties.getProperty("flutter.versionName", "1.0")

android {
    namespace = "com.silverdeveloper.smartnoteapp"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.silverdeveloper.smartnoteapp"
        minSdkVersion 26
        targetSdk = 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Ship native libs only for arm64-v8a. armeabi-v7a (legacy 32-bit
        // phones, <5% of active devices) and x86_64 (emulator-only) copies
        // are excluded — together they account for ~60% of the .apk size.
        //
        // If you publish to Play Store, build an App Bundle (.aab) instead
        // of an APK and Play will deliver per-ABI code automatically. In
        // that case you can remove this filter and ship arm64-v8a + armeabi-v7a
        // without inflating each user's download.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        exclude 'lib/arm64-v8a/libc++_shared.so'
        exclude 'lib/x86_64/libc++_shared.so'
    }

    configurations.all {
        exclude group: 'com.websitebeaver', module: 'opencv'
        exclude group: 'com.quickbirdstudios', module: 'opencv'
    }
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['-Xlint:unchecked']
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.websitebeaver:opencv:4.1.0'
    implementation('com.quickbirdstudios:opencv:4.5.1') {
        exclude group: 'com.websitebeaver', module: 'opencv'
    }
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
}

flutter {
    source = "../.."
}